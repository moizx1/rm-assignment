name: Deploy Backend

on:
  push:
    branches:
      - main
    paths:
      - 'assignment/assignment-be/**'
      - '.github/workflows/backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: assignment/assignment-be

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Prepare deployment package
        run: |
          mkdir deploy
          cp target/*.jar deploy/
          cp Dockerfile deploy/

      - name: Clean EC2 deployment directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            rm -rf /home/ec2-user/app
            mkdir -p /home/ec2-user/app

      - name: Copy deployment package
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "assignment/assignment-be/deploy/*"
          target: /home/ec2-user/app/
          strip_components: 3

      - name: Deploy Docker Container
        uses: appleboy/ssh-action@v1.0.3
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          AES_SECRET_KEY: ${{ secrets.AES_SECRET_KEY }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: DB_URL,DB_USERNAME,DB_PASSWORD,JWT_SECRET,AES_SECRET_KEY
          script: |
            cd /home/ec2-user/app

            echo "Deployment directory:"
            ls -la

            docker stop finnest-backend || true
            docker rm finnest-backend || true
            docker rmi finnest-backend || true

            docker build -t finnest-backend .

            docker run -d \
              --name finnest-backend \
              --restart unless-stopped \
              -p 8080:8080 \
              -e DB_URL="$DB_URL" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e AES_SECRET_KEY="$AES_SECRET_KEY" \
              finnest-backend

            docker ps -a
            docker logs --tail=100 finnest-backend