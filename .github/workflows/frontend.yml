name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'assignment/assignment-fe/**'
      - '.github/workflows/frontend.yml'

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: assignment/assignment-fe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_API_URL: http://${{ secrets.EC2_HOST }}:8080/api/v2
          VITE_AES_SECRET_KEY: ${{ vars.VITE_AES_SECRET_KEY }}
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-north-1

      - name: Deploy to S3
        run: |
          aws s3 sync dist/ s3://finnset-frontend-123 --delete